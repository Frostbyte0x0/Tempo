<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <header>
        <h1 class="title">Tempo</h1>
    </header>
    <div class="full-page-bg"></div>

    <div id="data" data-user='{{ data | tojson }}'></div>

    <button class="back-button">
        <a href="/" style="color: white; text-decoration: none;">Home</a>
    </button>

    <script>
        const allDatasets = JSON.parse(document.getElementById("data").dataset.user)["time_frames"];
        const colours = ["#5aed97", "#5aedc7", "#5abedc", "#5a97dc", "#5a5edc", "#975aed", "#c75aed", "#dc5aed", "#dc5a97", "#dc5a5a"];
        const showingBranches = Object.keys(allDatasets["week"]["data_sets"]);
        let timeFrame = "week";

        function flipBranch(branch) {
            if (showingBranches.includes(branch)) {
                showingBranches.splice(showingBranches.indexOf(branch), 1);
            } else {
                showingBranches.push(branch);
            }
        }

        function updateChart() {
            const L = chart.data.datasets.length;
            for (let i = 0; i < L; i++) {
                const d = chart.data.datasets.pop().borderColor;
                if (!colours.includes(d)) colours.push(d);
            }

            chart.data.labels = allDatasets[timeFrame]["labels"];

            for (const branch of Object.keys(allDatasets[timeFrame]["data_sets"])) {
                if (!showingBranches.includes(branch)) continue;
                chart.data.datasets.push({
                    label: branch,
                    data: allDatasets[timeFrame]["data_sets"][branch],
                    borderWidth: 2,
                    borderColor: colours.length > 0 ? colours.pop() : "#5a97dc",
                    tension: 0.2
                });
            }

            chart.update();
        }
    </script>

    <main class="main">
        <div id="sidebar" class="sidebar">
            <ul id="list">
                <li class="list-item"><a class="list-item" style="font-size: 25px; color: #5aedc7">Branches:</a></li>
            </ul>

            <script>
                const listParent = document.getElementById("list");

                const commits = JSON.parse(document.getElementById("data").dataset.user)["commits_per_branch"];
                const branches = Object.keys(commits);

                branches.forEach(branch => {
                    const li = document.createElement("li");
                    const button = document.createElement("button");
                    button.classList.add("side-button");
                    button.textContent = branch;
                    button.addEventListener("click", () => {
                        flipBranch(branch);
                        button.classList.toggle("pressed");
                        updateChart();
                    });
                    button.color = "white";
                    li.appendChild(button);
                    li.classList.add("list-item");
                    listParent.appendChild(li);
                });
            </script>
        </div>
        <script> document.getElementById("sidebar").style.height = listParent.clientHeight + 20 + "px" </script>

        <div id="graph" class="graph" style="padding: 0 2.5%">

            <div><a id="top-a" class="top-info-text"></a></div>
            <div><a id="middle-a" class="top-info-text"></a></div>
            <div><a id="bottom-a" class="top-info-text"></a></div>

            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

            <script>
                const data = JSON.parse(document.getElementById("data").dataset.user);
                const project_data = data["project_data"];

                Chart.defaults.color = "#FFFFFF";

                const graphDiv = document.getElementById("graph");

                const t = data["project_data"]["total"];
                const link = document.createElement("a");
                link.href = data["github_link"];
                link.target = "_blank";
                link.textContent = "Github";
                link.style.color = "#2391cc";
                document.getElementById("top-a").textContent = data["project"] + " [" + data["language"] + "], ";
                document.getElementById("top-a").appendChild(link);
                document.getElementById("middle-a").textContent = Math.floor(t / 60) + " hours, " + t % 60 + " minutes, " +
                    data["commit_number"] + " commits in " + Object.keys(data["commits_per_branch"]).length + " branches";
                document.getElementById("bottom-a").textContent = data["description"];

                const verticalLinePlugin = {
                    id: "verticalLine",
                    afterDraw(chart, args, pluginOptions) {
                        const xScale = chart.scales.x;
                        if (!xScale || pluginOptions.index === undefined || pluginOptions.index === null) {
                            return;
                        }

                        const x = xScale.getPixelForValue(pluginOptions.index);
                        const { ctx, chartArea } = chart;

                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(x, chartArea.top);
                        ctx.lineTo(x, chartArea.bottom);
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = "#5aedc7";
                        ctx.stroke();

                        if (pluginOptions.label) {
                            ctx.fillStyle = "#5aedc7";
                            ctx.font = "14px comfortaa, sans-serif";
                            ctx.textAlign = "left";
                            ctx.fillText(pluginOptions.label, x + 6, chartArea.top + 14);
                        }

                        ctx.restore();
                    }
                };

                Chart.register(verticalLinePlugin);

                const canvas = document.createElement("canvas");
                graphDiv.appendChild(canvas);

                const chart = new Chart(canvas, {
                    type: "line",
                    data: {
                        labels: allDatasets["week"]["labels"],
                        datasets: Object.entries(allDatasets["week"]["data_sets"]).map(([b, d]) => {
                            return {
                                label: b,
                                data: d,
                                borderWidth: 2,
                                borderColor: colours.length > 0 ? colours.pop() : "#5a97dc",
                                tension: 0.2
                            };
                        })
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        },
                        plugins: {
                            legend: {
                                display: true
                            },
                            verticalLine: {
                                index: 1,
                                label: "Target Date"
                            }
                        }
                    }
                });
            </script>
        </div>

        <div class="time-info" id="time-info">
            <ul id="time-list" style="margin: 0;">
                <li class="list-item">
                    <a class="list-item" style="font-size: 25px; color: #5a73ed">In the past </a>
                    <a id="time-info-title" class="list-item" style="font-size: 25px; color: #5a73ed">week</a>
                    <a class="list-item" style="font-size: 25px; color: #5a73ed">:</a>
                </li>
                <li class="list-item">
                    <a class="list-item">Nb of commits: </a>
                    <a id="time-info-commits" class="list-item"></a>
                </li>
                <li class="list-item">
                    <a class="list-item">Time spent: </a>
                    <a id="time-info-time" class="list-item"></a>
                </li>
            </ul>
        </div>
        <script>
            const frames = JSON.parse(document.getElementById("data").dataset.user)["frames"];

            frames.forEach(time => {
                const li = document.createElement("li");
                const button = document.createElement("button");
                button.classList.add("time-button");
                const text = "1 " + time.charAt(0).toUpperCase() + time.slice(1)
                button.textContent = text;
                if (time === "week") button.classList.add("pressed");
                button.addEventListener("click", () => {
                    timeFrame = time;
                    updateChart();
                    button.classList.add("pressed");
                    for (const btn of document.getElementsByClassName("time-button")) {
                        if (btn.textContent !== text) btn.classList.remove("pressed");
                    }
                    document.getElementById("time-info-title").textContent = time;
                    let d = 0;
                    chart.data.datasets[0].data.forEach(t => d += t);
                    document.getElementById("time-info-time").textContent = d.toString() + " min";
                    document.getElementById("time-info").style.height = document.getElementById("time-list").clientHeight + 20 + "px";
                });
                button.color = "white";
                li.appendChild(button);
                li.classList.add("list-item");
                document.getElementById("time-list").appendChild(li);
            });
            document.getElementById("time-info").style.height = document.getElementById("time-list").clientHeight + 20 + "px";
        </script>

    </main>

    <footer>
        <p class="footer">&copy; 2026 Frostbyte0x0. MIT Licence.</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <header>
        <h1 class="title">Tempo</h1>
    </header>
    <div class="full-page-bg"></div>

    <div id="data" data-user='{{ data | tojson }}'></div>

    <button class="back-button">
        <a href="/" style="color: white; text-decoration: none;">Home</a>
    </button>

    <script>
        const allDatasets = JSON.parse(document.getElementById("data").dataset.user)["data_sets"];
        let datasets = JSON.parse(document.getElementById("data").dataset.user)["data_sets"];

        function flipBranch(branch) {
            console.log(branch);
            if (Object.keys(datasets).includes(branch)) {
                datasets = Object.fromEntries(Object.entries(datasets).filter(([k, b]) => b !== branch));
            } else {
                datasets[branch] = allDatasets[branch];
            }
        }
    </script>

    <main class="main">
        <div id="sidebar" class="sidebar">
            <ul id="list">
                <li class="list-item"><a class="list-item" style="font-size: 25px; color: #5aedc7">Branches:</a></li>
            </ul>

            <script>
                const listParent = document.getElementById("list");

                const commits = JSON.parse(document.getElementById("data").dataset.user)["commits_per_branch"];
                const branches = Object.keys(commits);

                branches.forEach(branch => {
                    const li = document.createElement("li");
                    const button = document.createElement("button");
                    button.classList.add("side-button");
                    button.textContent = branch;
                    button.addEventListener("click", () => {
                        flipBranch(branch);
                        chart.update();
                    });
                    button.color = "white";
                    li.appendChild(button);
                    li.classList.add("list-item");
                    listParent.appendChild(li);
                });
            </script>
        </div>
        <script> document.getElementById("sidebar").style.height = listParent.clientHeight + 20 + "px" </script>

        <div id="graph" class="graph" style="padding: 0 10%">

            <div><a id="top-a" class="top-info-text"></a></div>
            <div><a id="middle-a" class="top-info-text"></a></div>
            <div><a id="bottom-a" class="top-info-text"></a></div>

            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

            <script>
                const data = JSON.parse(document.getElementById("data").dataset.user);
                const project_data = data["project_data"];
                const labels = data["labels"];

                Chart.defaults.color = "#FFFFFF";

                const graphDiv = document.getElementById("graph");

                const t = data["project_data"]["total"];
                const link = document.createElement("a");
                link.href = data["github_link"];
                link.target = "_blank";
                link.textContent = "Github";
                link.style.color = "#2391cc";
                document.getElementById("top-a").textContent = data["project"] + " [" + data["language"] + "], ";
                document.getElementById("top-a").appendChild(link);
                document.getElementById("middle-a").textContent = Math.floor(t / 60) + " hours, " + t % 60 + " minutes, " +
                    data["commit_number"] + " commits in " + Object.keys(data["commits_per_branch"]).length + " branches";
                document.getElementById("bottom-a").textContent = data["description"];

                const verticalLinePlugin = {
                    id: "verticalLine",
                    afterDraw(chart, args, pluginOptions) {
                        const xScale = chart.scales.x;
                        if (!xScale || pluginOptions.index === undefined || pluginOptions.index === null) {
                            return;
                        }

                        const x = xScale.getPixelForValue(pluginOptions.index);
                        const { ctx, chartArea } = chart;

                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(x, chartArea.top);
                        ctx.lineTo(x, chartArea.bottom);
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = "#5aedc7";
                        ctx.stroke();

                        if (pluginOptions.label) {
                            ctx.fillStyle = "#5aedc7";
                            ctx.font = "14px comfortaa, sans-serif";
                            ctx.textAlign = "left";
                            ctx.fillText(pluginOptions.label, x + 6, chartArea.top + 14);
                        }

                        ctx.restore();
                    }
                };

                Chart.register(verticalLinePlugin);

                const canvas = document.createElement("canvas");
                graphDiv.appendChild(canvas);

                let chart = new Chart(canvas, {
                    type: "line",
                    data: {
                        labels: labels,
                        datasets: Object.entries(datasets).map(([b, d]) => {
                            return {
                                label: b,
                                data: d,
                                borderWidth: 2,
                                borderColor: "#5aedc7",
                                tension: 0.2
                        }})
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        },
                        plugins: {
                            legend: {
                                display: Object.keys(datasets).length > 1
                            },
                            verticalLine: {
                                index: 1,
                                label: "Target Date"
                            }
                        }
                    }
                });
            </script>

        </div>
    </main>

    <footer>
        <p class="footer">&copy; 2026 Frostbyte0x0. MIT Licence.</p>
    </footer>
</body>
</html>

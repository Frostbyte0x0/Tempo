<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <header>
        <h1 class="title">Tempo</h1>
    </header>
    <div class='full-page-bg'></div>

    <div id="data" data-user='{{ data | tojson }}'></div>

    <main class="main">
        <div id="sidebar" class="sidebar">
            <ul id="list">
                <li class="list-item"><a class="list-item" style="font-size: 25px; color: #5aedc7">Branches:</a></li>
                <li class="list-item"><a href="/" class="list-item">Overview</a></li>
            </ul>

            <script>
                const listParent = document.getElementById('list');

                const projectList = JSON.parse(document.getElementById("data").dataset.user)["project_list"];
                const items = Object.keys(projectList);

                items.forEach(itemText => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.textContent = itemText;
                    a.href = "/project/" + itemText;
                    a.style.color = "white";
                    li.appendChild(a);
                    li.classList.add('list-item');
                    listParent.appendChild(li);
                });
            </script>
        </div>
        <script> document.getElementById('sidebar').style.height = listParent.clientHeight + 20 + 'px' </script>

        <div id="graph" class="graph" style="padding: 0 10%">
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <script>
                const data = JSON.parse(document.getElementById('data').dataset.user);
                const project_data = data["project_data"];
                const labels = data["labels"];

                Chart.defaults.color = '#FFFFFF';

                const graphDiv = document.getElementById('graph');

                const topInfoElement = document.createElement('a');
                topInfoElement.classList.add('top-info-text');
                topInfoElement.textContent = data["project"] + " - " + data["project_data"]["total"] + " minutes";
                graphDiv.appendChild(topInfoElement);

                const bottomInfoElement = document.createElement('a');
                bottomInfoElement.classList.add('top-info-text');
                bottomInfoElement.textContent = data["language"] + " - " + data["description"];
                graphDiv.appendChild(bottomInfoElement);

                const canvas = document.createElement('canvas');
                graphDiv.appendChild(canvas);

                new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'minutes',
                            data: data["data_set"],
                            borderWidth: 2,
                            borderColor: '#5aedc7',
                            tension: 0.2
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            </script>

        </div>
    </main>

    <footer>
        <p class="footer">&copy; 2026 Frostbyte0x0. MIT Licence.</p>
    </footer>
</body>
</html>
